services:
  postgres:
    image: postgres:15-alpine
    container_name: kitchenpal_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: kitchenpal
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./complete_schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    container_name: kitchenpal_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: kitchenpal
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres123
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-credentials.json
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
      - ./backend/google-credentials.json:/app/google-credentials.json
    command: npm run dev

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kitchenpal_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kitchenpal.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  kitchenpal_admin:
    build:
      context: ./KitchenPal-admin
      dockerfile: Dockerfile
      target: development
    container_name: kitchenpal_admin
    restart: always
    ports:
      - "4200:4200"
    environment:
      NODE_ENV: development
    volumes:
      - ./KitchenPal-admin/src:/app/src
    command: npm start -- --host 0.0.0.0 --poll 2000

volumes:
  postgres_data:
  pgadmin_data:
