<div class="modal-overlay" *ngIf="show" (click)="onOverlayClick()">
  <div class="modal-content recipe-modal" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="modal-header">
      <h3>Create New Recipe</h3>
      <button class="close-btn" (click)="onCancel()">×</button>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <!-- Image Upload -->
      <div class="image-upload-area" (click)="triggerFileInput()">
        <img *ngIf="form.imagePreview" [src]="form.imagePreview" alt="Recipe preview" class="image-preview" />
        <div *ngIf="!form.imagePreview" class="upload-placeholder">
          <span class="material-icons upload-icon">image</span>
          <p class="upload-text">Click to upload recipe image</p>
          <p class="upload-hint">PNG, JPG up to 5MB</p>
        </div>
        <input
          id="recipeImageInput"
          type="file"
          accept="image/*"
          (change)="onImageSelected($event)"
          style="display: none"
        />
      </div>

      <!-- Recipe Name -->
      <div class="form-group">
        <label>Recipe Name <span class="required">*</span></label>
        <input
          type="text"
          [(ngModel)]="form.name"
          class="form-control"
          placeholder="e.g. Vegetable Soup"
        />
      </div>

      <!-- Cooking Time + Price -->
      <div class="form-row">
        <div class="form-group">
          <label>Cooking Time (min) <span class="required">*</span></label>
          <input
            type="number"
            [(ngModel)]="form.cookingTime"
            class="form-control"
            placeholder="e.g. 30"
            min="1"
          />
        </div>
        <div class="form-group">
          <label>Price ($) <span class="required">*</span></label>
          <input
            type="number"
            [(ngModel)]="form.price"
            class="form-control"
            placeholder="e.g. 12.99"
            min="0"
            step="0.01"
          />
        </div>
      </div>

      <!-- Description / Steps -->
      <div class="form-group">
        <label>Recipe Description / Steps</label>
        <textarea
          [(ngModel)]="form.description"
          class="form-control"
          rows="4"
          placeholder="Describe the cooking steps..."
        ></textarea>
      </div>

      <!-- Ingredients -->
      <div class="ingredients-section">
        <div class="ingredients-header">
          <label class="section-label">Ingredients</label>
          <button class="btn btn-add-ingredient" type="button" (click)="addIngredient()">
            + Add Ingredient
          </button>
        </div>

        <div class="ingredient-row" *ngFor="let ingredient of form.ingredients; let i = index">
          <input
            type="text"
            [(ngModel)]="ingredient.name"
            class="form-control ingredient-name"
            placeholder="Ingredient name"
          />
          <input
            type="number"
            [(ngModel)]="ingredient.quantity"
            class="form-control ingredient-qty"
            placeholder="Qty"
            min="0"
            step="0.01"
          />
          <select [(ngModel)]="ingredient.unitId" class="form-control ingredient-unit">
            <option *ngFor="let unit of units" [value]="unit.id">{{ unit.label }}</option>
          </select>
          <button
            class="remove-ingredient-btn"
            type="button"
            (click)="removeIngredient(i)"
            [disabled]="form.ingredients.length === 1"
            title="Remove ingredient"
          >
            ×
          </button>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn btn-secondary" type="button" (click)="onCancel()">Cancel</button>
      <button
        class="btn btn-primary"
        type="button"
        (click)="onSave()"
        [disabled]="!isFormValid()"
      >
        Save Recipe
      </button>
    </div>

  </div>
</div>
