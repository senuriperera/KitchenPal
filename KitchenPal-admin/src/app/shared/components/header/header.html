<header class="page-header">
  <div class="header-content">
    <div class="header-text">
      <h1 class="page-title">{{ title }}</h1>
      <p class="page-subtitle">{{ subtitle }}</p>
    </div>
    <div class="header-actions">
      <div class="notification-bell-container">
        <button class="icon-btn notification-bell" (click)="toggleDropdown()" title="Notifications">
          <span class="material-icons icon">notifications</span>
          <span *ngIf="unreadCount > 0" class="badge">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
        </button>
        <div *ngIf="isDropdownOpen" class="notification-dropdown">
          <div class="dropdown-header">
            <h3>Pending Approvals</h3>
            <button class="mark-all-btn" (click)="markAllAsRead()">Mark all as read</button>
          </div>
          <div class="dropdown-content">
            <div *ngIf="isLoadingNotifications" class="loading">
              <span class="material-icons">hourglass_empty</span>
              Loading...
            </div>
            <div *ngIf="!isLoadingNotifications && notifications.length === 0" class="empty-state">
              <span class="material-icons">notifications_none</span>
              <p>No pending approvals</p>
            </div>
            <div *ngIf="!isLoadingNotifications && notifications.length > 0" class="notification-list">
              <div *ngFor="let notification of notifications; let i = index" 
                   class="notification-item" 
                   [class.unread]="!notification.is_read"
                   (click)="markAsRead(notification, i)">
                <div class="notification-content">
                  <p class="notification-title">{{ notification.title }}</p>
                  <p class="notification-branch" *ngIf="notification.branch_name">
                    {{ notification.branch_name }}
                  </p>
                  <p class="notification-time">{{ getTimeAgo(notification.created_at) }}</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="user-profile">
        <span class="material-icons icon">account_circle</span>
        <span class="user-name">{{
          (currentUser$ | async)?.name || "User"
        }}</span>
      </div>
      <button class="logout-btn" (click)="logout()" title="Logout">
        <span class="material-icons icon">logout</span>
        <span class="logout-text">Logout</span>
      </button>
    </div>
  </div>
</header>
