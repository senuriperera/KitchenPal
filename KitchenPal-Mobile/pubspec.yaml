name: kitchenpal_mobile
description: Kitchen inventory management app built with Flutter
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cloudinary_flutter: ^1.0.0
  cloudinary_url_gen: ^1.0.0
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.1
  fl_chart: ^1.1.1
  image_picker: ^1.0.7
  cloudinary_public: ^0.23.1
  intl: ^0.18.1
  socket_io_client: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  http_mock_adapter: ^0.6.1
  test: ^1.24.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/cafe.jpg
