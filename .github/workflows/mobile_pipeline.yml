name: Mobile Pipeline

# CI pipeline for Flutter mobile application
# Runs tests, code analysis, and builds on push/PR

on:
  push:
    branches: ["main", "mobile-test2"]
    paths:
      - "KitchenPal-Mobile/**"
  pull_request:
    branches: ["main", "mobile-test2"]
    paths:
      - "KitchenPal-Mobile/**"

jobs:
  test:
    name: Test Flutter App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./KitchenPal-Mobile

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2" # Updated to match Dart SDK 3.10.4 requirement
          channel: "stable"

      - name: Verify Flutter Installation
        run: |
          flutter --version
          flutter doctor -v

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Check Code Formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: Run Tests
        run: flutter test --coverage --reporter=expanded --file-reporter=json:test-results.json

      - name: Generate HTML Test Report
        if: always()
        run: |
          dart pub global activate junitreport
          flutter test --reporter=json > test-results.json || true
          cat test-results.json | dart pub global run junitreport:tojunit > test-results.xml || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            KitchenPal-Mobile/test-results.json
            KitchenPal-Mobile/test-results.xml
          retention-days: 7

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: KitchenPal-Mobile/coverage/
          retention-days: 7

      - name: Test Summary
        if: always()
        run: |
          echo "All tests completed"
          echo "Coverage report generated"
          echo "Check artifacts for detailed reports"

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: ./KitchenPal-Mobile

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: "stable"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: KitchenPal-Mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
