name: Admin Portal Pipeline

on:
  push:
    branches: [ "main", "KitchenPal-admin" ]
    paths:
      - 'KitchenPal-admin/**'
  pull_request:
    branches: [ "main", "KitchenPal-admin" ]
    paths:
      - 'KitchenPal-admin/**'

jobs:
  test:
    name: Test Admin Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./KitchenPal-admin

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: './KitchenPal-admin/package-lock.json'

    - name: Install Dependencies
      run: npm ci

    - name: Run Tests
      # Using --watch=false --browsers=ChromeHeadless to run tests once in CI environment
      run: npm test -- --watch=false --browsers=ChromeHeadless
