name: Admin Portal Pipeline

on:
  push:
    branches: [ "main", "KitchenPal-admin" ]
    paths:
      - 'KitchenPal-admin/**'
  pull_request:
    branches: [ "main", "KitchenPal-admin" ]
    paths:
      - 'KitchenPal-admin/**'

jobs:
  test:
    name: Test & Build Admin Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./KitchenPal-admin

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'KitchenPal-admin/package-lock.json'

    - name: Install Dependencies
      run: npm ci

    - name: Run Tests with Coverage
      run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

    - name: Build
      run: npm run build

    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: admin-coverage
        path: KitchenPal-admin/coverage/
        retention-days: 7
