name: Docker CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker-ci-cd.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "20"

jobs:
  build-test-push:
    name: Build, Test, and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up BuildKit Docker container builder for faster builds with caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract Docker metadata
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Setup a PostgreSQL service container for integration tests
      - name: Setup PostgreSQL for testing
        uses: ikalnytskyi/action-setup-postgres@v4
        with:
          username: postgres
          password: postgres
          database: kitchenpal_test
          port: 5432

      # Build and test with cache layers
      - name: Build and test Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: kitchenpal-backend:test
          target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run tests inside the container
      - name: Run tests in container
        run: |
          docker run --rm \
            --network host \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=kitchenpal_test \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            -e NODE_ENV=test \
            kitchenpal-backend:test \
            npm run test:ci

      # Build production image with cache
      - name: Build and push production Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # If we're on main branch, notify about deployment
      - name: Deployment notification
        if: github.ref == 'refs/heads/main'
        run: |
          echo "✅ Production Docker image for KitchenPal backend has been successfully built and pushed."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest"
